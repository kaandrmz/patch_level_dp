seml:
  project_root_dir: /nfs/homedirs/duk/patch_level_dp
  executable: seml/scripts/run_training_classification_experiment.py
  output_dir: seml/output/logs/vgg_dtd
  name: vgg_dtd_experiments


slurm:
  - experiments_per_job: 1
    sbatch_options:
      gres: gpu:1
      cpus-per-task: 8
      time: 00-02:30
      partition: gpu_a100

fixed:
  model_name: "vgg11"
  dataset_name: "dtd"
  dataset_root: "/nfs/homedirs/duk/dtd"
  pretrained: True
  
  max_physical_batch_size: 4
  
  privacy_patch_size: [5, 5]
  padding: 0
   
  check_val_every_n_epoch: 2
  num_sanity_val_steps: 0
  checkpoint_dir: "/nfs/students/duk/checkpoints"
  
  lr_scheduler: "cosine"
  small_input: False

grid:
  clip_norm:
    type: choice
    options:
      - 0.5

  crop_size:
    type: choice
    options:
      - 100

  num_epochs:
    type: choice
    options:
      - 150

  lr: 
    type: choice
    options:
      - 0.002
    
  epsilon:
    type: choice
    options:
      - 1
      - 5
      - 10
      - 15
      - 20
      - 30
      - 40
      - 50
      - 60
      - 70
      - 80
      - 90
      - 100

  seed:
    type: choice
    options:
      - 10
      - 20
      - 30
      - 516

  baseline_privacy:
    type: choice
    options:
      - False
      - True

  batch_size:
    type: choice
    options:
      - 64

  weight_decay:
    type: choice
    options:
      - 1e-4
